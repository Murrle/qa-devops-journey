name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  ENVIRONMENT: staging
  BASE_URL: https://playwright.dev

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-jammy
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chromium
            tag: "@chrome"
          - browser: firefox
            tag: "@firefox"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run ${{ matrix.tag }} tests on ${{ matrix.browser }}
        run: npx playwright test --project=${{ matrix.browser }} --grep "${{ matrix.tag }}"
        env:
          BASE_URL: ${{ env.BASE_URL }}
          ENVIRONMENT: ${{ env.ENVIRONMENT }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

  notify-on-failure:
    needs: test
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Notify failure
        run: |
          echo "❌ Pipeline FAILED!"
          echo "Browser matrix job failed on: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Check report at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"